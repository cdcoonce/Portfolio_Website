name: Wiki Sync

on:
  push:
    branches: [master]
    paths:
      - "WebContent/js/**"
      - "WebContent/css/**"
      - "WebContent/context/**"
      - "lambda/**"
      - "__tests__/**"
      - "tests/**"
      - ".github/workflows/**"

jobs:
  sync-wiki:
    name: Regenerate and sync wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Python setup ---
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11.9"

      - name: Install Python dependencies
        run: uv sync --frozen

      # --- Regenerate wiki ---
      - name: Run wiki orchestrator
        run: uv run python scripts/wiki/orchestrate.py

      # --- Sync to GitHub Wiki ---
      - name: Clone wiki repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo \
            || { echo "::error::Wiki repo not found. Initialize the GitHub Wiki by creating at least one page in the GitHub UI first."; exit 1; }

      - name: Copy wiki files
        run: |
          rm -f wiki-repo/*.md
          cp wiki/*.md wiki-repo/

      - name: Commit and push wiki
        run: |
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore(wiki): regenerate from ${{ github.sha }}"
          git push
