name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- Linting ---
      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint CSS (Stylelint)
        run: npm run lint:css

      - name: Lint JS (ESLint)
        run: npm run lint:js

      # --- Tests ---
      - name: Run JS unit tests (Jest)
        run: npm test

      # --- Build the Astro site (also the deploy artifact source) ---
      - name: Build site (Astro)
        run: npm run build

  deploy:
    name: Deploy to gh-pages
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro)
        run: npm run build

      # Publishes the built dist/ (including CNAME) to the gh-pages branch,
      # which GitHub Pages serves. Replaces the previous main->gh-pages mirror.
      - name: Publish dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
