name: Deploy staging (dev → Cloudflare Pages)

on:
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  staging:
    name: Build & deploy dev to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro)
        run: npm run build

      # Publishes dist/ to the Cloudflare Pages project (staging).
      # Self-skips until the two repo secrets are set, so the first pushes
      # don't fail red. Add CLOUDFLARE_API_TOKEN (Pages:Edit) and
      # CLOUDFLARE_ACCOUNT_ID under Settings → Secrets and variables → Actions.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping staging deploy."
            echo "Add CLOUDFLARE_API_TOKEN (Pages:Edit) + CLOUDFLARE_ACCOUNT_ID as repo secrets to enable."
            exit 0
          fi
          npx wrangler pages deploy dist \
            --project-name charleslikesdata-portfolio \
            --branch dev \
            --commit-dirty=true
